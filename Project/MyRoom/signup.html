<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="banner">
    <h1>회원가입</h1>
  </header>

  <main class="login-container">
    <div class="form-box">
      <form id="signup-form" class="login-form">
        <input type="text" id="signup-id" placeholder="아이디" required />
        <input type="password" id="signup-password" placeholder="비밀번호" required />
        <input type="text" id="signup-name" placeholder="닉네임" required />
        <button type="submit">회원가입</button>
      </form>

      <p id="signup-message" class="form-message">
      이미 계정이 있으신가요? <a href="index.html">로그인</a>
      </p>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
